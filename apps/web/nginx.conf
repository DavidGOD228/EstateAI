server_tokens off;

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 1m;

    # Security headers applied to all responses. Declared at server level
    # (not in a `location` block) so they're inherited everywhere — nginx's
    # `add_header` inheritance rule only breaks if a location block declares
    # its own `add_header`, which neither location below does; keep it that
    # way, or duplicate these headers into any location that adds its own.
    # HSTS is intentionally omitted: this compose stack terminates HTTP, and
    # HSTS must be enabled at the TLS-terminating proxy in production instead.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Same-origin design: nginx proxies /api/* to the backend so the browser
    # only ever talks to one origin (preserves the /api prefix on purpose).
    location /api/ {
        proxy_pass http://api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
